<div class="login-page">
  <div class="login-card">
    <header class="login-header">
      <h1 class="login-title">Game Manager</h1>
      <p class="login-subtitle">Sign in to play</p>
    </header>

    <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span class="field-label">Username</span>
        <input
          type="text"
          formControlName="username"
          autocomplete="username"
          class="field-input"
          [class.field-input--invalid]="
            form.controls.username.invalid && form.controls.username.touched
          "
        />
      </label>

      <label class="field">
        <span class="field-label">Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="field-input"
          [class.field-input--invalid]="
            form.controls.password.invalid && form.controls.password.touched
          "
        />
      </label>

      @if (errorMessage) {
        <p class="form-error" role="alert">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn btn--primary" [disabled]="submitting">
        {{ submitting ? 'Signing in…' : 'Log in' }}
      </button>
    </form>

    <p class="login-hint">
      Try <code>admin</code> / <code>admin</code>,
      <code>player</code> / <code>game123</code>, or <code>demo</code> /
      <code>demo</code>
    </p>
  </div>
</div>
